name: Book

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'
  pull_request:
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: book-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: '0.4.40'
  MDBOOK_MERMAID_VERSION: '0.13.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install mdbook + mdbook-mermaid
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/bin"
          curl -fsSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-v${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: install mermaid assets
        working-directory: book
        run: mdbook-mermaid install .

      - name: build book
        working-directory: book
        run: mdbook build

      - name: upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: book
          path: book/book
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download built book
        uses: actions/download-artifact@v4
        with:
          name: book
          path: book-out

      - name: deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book-out
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
